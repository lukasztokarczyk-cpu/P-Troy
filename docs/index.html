<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ERP Elektryk — Logowanie</title>
<link rel="icon" href="assets/img/logo.svg" onerror="this.remove()" />
<link rel="stylesheet" href="assets/css/styles.css" />
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="login-page">
  <div class="login-glow top"></div>
  <div class="login-glow bottom"></div>

  <div class="login-card slide-up">
    <div class="login-logo-wrap">
      <div class="login-logo pop-in">
        <svg data-lucide="zap" style="color:#fff" fill="#fff"></svg>
      </div>
      <div>
        <p class="login-title">ERP Elektryk</p>
        <p class="login-subtitle">System zarządzania firmą elektryczną</p>
      </div>
    </div>

    <form id="loginForm">
      <div id="errorBox"></div>

      <div class="field">
        <svg data-lucide="user"></svg>
        <input id="login" placeholder="Login" autocomplete="username" required />
      </div>

      <div class="field">
        <svg data-lucide="lock"></svg>
        <input id="password" type="password" placeholder="Hasło" autocomplete="current-password" required />
      </div>

      <div class="row-between">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe" /> Zapamiętaj mnie
        </label>
        <a href="#" class="link-accent" onclick="showToast('W wersji demo reset hasła jest wyłączony'); return false;">
          Nie pamiętasz hasła?
        </a>
      </div>

      <button type="submit" class="btn-primary">
        <svg data-lucide="log-in" style="width:16px;height:16px"></svg>
        Zaloguj się
      </button>
    </form>

    <p class="demo-hint">
      Konta demo — Administrator: <strong>admin</strong> / <strong>admin123</strong><br/>
      Instalator: <strong>pwisniewski</strong>, <strong>azielinska</strong> lub <strong>tkowalczyk</strong> / <strong>haslo123</strong>
    </p>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script>
  // Jeśli sesja już istnieje, od razu przejdź do panelu
  if (getSession()) window.location.href = 'dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const login = document.getElementById('login').value.trim();
    const password = document.getElementById('password').value;
    const errorBox = document.getElementById('errorBox');
    errorBox.innerHTML = '';

    // Uwaga: to WYŁĄCZNIE demonstracja UI — brak prawdziwej autoryzacji
    // ani backendu. Pełna wersja z JWT/bcrypt znajduje się w folderze
    // backend/ (wymaga hostingu z Node.js + PostgreSQL, nie GitHub Pages).
    const user = validateLogin(login, password);
    if (user) {
      setSession(user);
      window.location.href = 'dashboard.html';
    } else {
      errorBox.innerHTML = '<div class="error-box fade-in">Nieprawidłowy login lub hasło</div>';
    }
  });

  lucide.createIcons();
</script>
</body>
</html>
